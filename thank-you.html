<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Diego Cortes | Cortes & Co. Realty Group</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .thankyou-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--navy); text-align: center; padding: 40px 24px;
  }
  .thankyou-box { max-width: 520px; }
  .thankyou-icon { font-size: 56px; margin-bottom: 24px; }
  .thankyou-title {
    font-family: var(--font-display); font-size: clamp(28px, 5vw, 42px);
    font-weight: 700; color: var(--white); line-height: 1.2; margin-bottom: 16px;
  }
  .thankyou-title em { color: var(--gold); font-style: italic; }
  .thankyou-sub {
    font-size: 16px; color: rgba(255,255,255,.65); line-height: 1.75;
    margin-bottom: 36px;
  }
</style>
</head>
<body>
  <div class="thankyou-wrap">
    <div class="thankyou-box">
      <div class="thankyou-icon">🏡</div>
      <h1 class="thankyou-title">Thanks — <em>Diego will be in touch!</em></h1>
      <p class="thankyou-sub">Your message was sent successfully. Diego typically responds within a few hours. In the meantime, feel free to explore the site.</p>
      <a href="index.html" class="btn-primary" style="display:inline-flex; margin: 0 auto;">← Back to Home</a>
    </div>
  </div>
</body>
</html>
